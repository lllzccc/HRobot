name: Release desktop apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix
        required: true
        default: "0.1.3"

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$DISPATCH_VERSION"
          fi
          test -n "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  tests:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt pytest
      - run: python -m pytest tests

  windows:
    needs: [metadata, tests]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Windows installer
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File scripts\package_windows.ps1 -Version "${{ needs.metadata.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ needs.metadata.outputs.version }}
          path: |
            ${{ runner.workspace }}/HRobot package/windows/${{ needs.metadata.outputs.version }}/hrobot-win-${{ needs.metadata.outputs.version }}.exe
            ${{ runner.workspace }}/HRobot package/windows/${{ needs.metadata.outputs.version }}/release.json
          if-no-files-found: error

  macos:
    needs: [metadata, tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch }}
      - name: Build macOS app and DMG
        run: bash scripts/package_macos.sh "${{ needs.metadata.outputs.version }}" "${{ matrix.arch }}" "$RUNNER_TEMP/release-dist"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-${{ needs.metadata.outputs.version }}
          path: ${{ runner.temp }}/release-dist/hrobot-mac-${{ matrix.arch }}-${{ needs.metadata.outputs.version }}.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [metadata, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          NOTES="docs/release-notes/v${VERSION}.md"
          if [[ ! -f "$NOTES" ]]; then
            NOTES=""
          fi
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" release-assets/* --clobber
            if [[ -n "$NOTES" ]]; then
              gh release edit "v${VERSION}" --title "HRobot v${VERSION}" --notes-file "$NOTES"
            fi
          elif [[ -n "$NOTES" ]]; then
            gh release create "v${VERSION}" release-assets/* --title "HRobot v${VERSION}" --notes-file "$NOTES"
          else
            gh release create "v${VERSION}" release-assets/* --title "HRobot v${VERSION}" --generate-notes
          fi
